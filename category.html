<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Andes Magazine — Categoría</title>
<meta name="description" content="Sección editorial de Andes Magazine.">

<!-- Favicons -->
<link rel="icon" type="image/x-icon" href="assets/favicon.ico">
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="assets/favicon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="assets/favicon-180.png">
<meta name="theme-color" content="#111110">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..700,0..100;1,9..144,300..700,0..100&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --stone: #111110;
  --stone-2: #17171a;
  --snow: #f2efe9;
  --glacier: #b8c5cc;
  --rock: #7a746b;
  --rock-2: #5a554c;
  --summit: #e8e4dc;
  --accent: #1188A6;
  --line: rgba(255,255,255,0.08);
  --line-strong: rgba(255,255,255,0.16);

  --serif: 'Fraunces', 'Times New Roman', serif;
  --sans: 'DM Sans', system-ui, sans-serif;
  --mono: 'JetBrains Mono', monospace;

  --pad: clamp(1.5rem, 4vw, 3rem);
}

html { scroll-behavior: smooth; }
body {
  background: var(--stone);
  color: var(--snow);
  font-family: var(--sans);
  font-weight: 400;
  line-height: 1.6;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

img { display: block; max-width: 100%; }
a { color: inherit; }

/* ─── GRAIN OVERLAY ─── */
body::after {
  content: '';
  position: fixed; inset: 0;
  pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.6'/%3E%3C/svg%3E");
  opacity: 0.08;
  mix-blend-mode: overlay;
  z-index: 1000;
}

/* ─── NAV ─── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; justify-content: space-between; align-items: center;
  padding: 1rem var(--pad);
  font-family: var(--sans);
  background: linear-gradient(to bottom, rgba(17,17,16,0.85) 0%, rgba(17,17,16,0.5) 100%);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--line);
}
.brand { display: flex; align-items: center; text-decoration: none; color: #fff; }
.nav-logo { display: block; height: 44px; width: auto; transition: opacity 0.3s; }
.brand:hover .nav-logo { opacity: 0.85; }
nav ul { list-style: none; display: flex; gap: 2.25rem; }
nav a {
  color: var(--snow); text-decoration: none;
  font-size: 0.7rem; letter-spacing: 0.22em; text-transform: uppercase;
  font-weight: 400; opacity: 0.78;
  transition: opacity 0.3s;
}
nav a:hover, nav a.is-active { opacity: 1; }
nav a.is-active { color: var(--accent); }

/* ─── HEADER DE CATEGORÍA ─── */
.cat-header {
  padding: 10rem var(--pad) 5rem;
  max-width: 1400px;
  margin: 0 auto;
  border-bottom: 1px solid var(--line);
}
.cat-meta {
  font-family: var(--mono);
  font-size: 0.7rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 2rem;
  display: flex; align-items: center; gap: 1rem;
}
.cat-meta::after {
  content: ''; flex: 1; height: 1px; background: var(--line); max-width: 120px;
}
.cat-title {
  font-family: var(--serif);
  font-variation-settings: "opsz" 144, "SOFT" 40;
  font-size: clamp(3rem, 8vw, 6.5rem);
  font-weight: 300;
  line-height: 1;
  letter-spacing: -0.03em;
  color: var(--snow);
  margin-bottom: 1.5rem;
}
.cat-tagline {
  font-family: var(--serif);
  font-variation-settings: "opsz" 36, "SOFT" 60;
  font-style: italic;
  font-size: clamp(1.2rem, 2vw, 1.6rem);
  font-weight: 300;
  color: var(--glacier);
  max-width: 48ch;
  margin-bottom: 2rem;
}
.cat-desc {
  font-size: 0.95rem;
  line-height: 1.7;
  color: var(--summit);
  max-width: 58ch;
  opacity: 0.9;
}

/* ─── LISTADO DE ARTÍCULOS ─── */
.articles {
  padding: 5rem var(--pad) 8rem;
  max-width: 1400px;
  margin: 0 auto;
}
.section-label {
  font-family: var(--mono);
  font-size: 0.65rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--rock);
  margin-bottom: 3rem;
  display: flex; align-items: center; gap: 1.5rem;
}
.section-label::before {
  content: '§';
  color: var(--accent);
  font-family: var(--serif); font-style: italic; font-size: 1rem;
}
.section-label::after {
  content: ''; flex: 1; height: 1px; background: var(--line);
}

.article-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 3.5rem 3rem;
}
.card {
  display: block;
  text-decoration: none;
  color: inherit;
  cursor: pointer;
  transition: opacity 0.3s;
}
.card:hover { opacity: 0.88; }
.card-img {
  position: relative;
  overflow: hidden;
  aspect-ratio: 4/3;
  margin-bottom: 1.5rem;
  background: var(--stone-2);
}
.card-img img {
  width: 100%; height: 100%;
  object-fit: cover;
  filter: brightness(0.72) contrast(1.05) saturate(0.9);
  transition: all 0.8s cubic-bezier(.2,.8,.2,1);
}
.card:hover .card-img img {
  filter: brightness(0.95) contrast(1.05);
  transform: scale(1.04);
}
.card-cat {
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 0.9rem;
}
.card h3 {
  font-family: var(--serif);
  font-variation-settings: "opsz" 48, "SOFT" 40;
  font-size: clamp(1.4rem, 2vw, 1.9rem);
  font-weight: 350;
  line-height: 1.2;
  letter-spacing: -0.01em;
  color: var(--snow);
  margin-bottom: 1rem;
  max-width: 22ch;
}
.card-excerpt {
  font-size: 0.9rem;
  line-height: 1.65;
  color: var(--summit);
  opacity: 0.82;
  margin-bottom: 1rem;
  max-width: 44ch;
}
.card-byline {
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--rock);
  display: flex; gap: 1.25rem;
}
.card-byline span:not(:last-child)::after {
  content: '·'; margin-left: 1.25rem; color: var(--rock-2);
}

.empty {
  padding: 4rem 0;
  font-family: var(--serif);
  font-style: italic;
  font-size: 1.2rem;
  color: var(--rock);
  text-align: center;
}

/* ─── FOOTER ─── */
footer {
  padding: 4rem var(--pad) 2rem;
  border-top: 1px solid var(--line);
  background: var(--stone-2);
}
.footer-bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
  max-width: 1400px;
  margin: 0 auto;
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--rock-2);
}
.footer-bottom a { color: var(--rock-2); text-decoration: none; transition: color 0.3s; }
.footer-bottom a:hover { color: var(--snow); }
.footer-bottom .legal { display: flex; gap: 2rem; }

/* ─── RESPONSIVE ─── */
@media (max-width: 960px) {
  nav { padding: 1rem 1.25rem; }
  nav ul { display: none; }
  .cat-header { padding: 7rem 1.25rem 3rem; }
  .articles { padding: 3rem 1.25rem 5rem; }
  .article-grid { grid-template-columns: 1fr; gap: 3rem; }
  .footer-bottom { flex-direction: column; gap: 1rem; align-items: flex-start; }
}
</style>
</head>
<body>

<!-- ═══ NAV ═══ -->
<nav>
  <a href="index.html" class="brand">
    <img src="assets/logo-andes.png" alt="Andes Magazine" class="nav-logo">
  </a>
  <ul>
    <li><a href="category.html?cat=prensa" data-nav="prensa">Prensa</a></li>
    <li><a href="category.html?cat=cultura" data-nav="cultura">Cultura</a></li>
    <li><a href="category.html?cat=analisis" data-nav="analisis">Análisis</a></li>
    <li><a href="accesos.html">Accesos</a></li>
    <li><a href="index.html#nosotros">Nosotros</a></li>
  </ul>
</nav>

<!-- ═══ HEADER ═══ -->
<header class="cat-header">
  <div class="cat-meta" id="cat-meta">— Eje editorial</div>
  <h1 class="cat-title" id="cat-title">Categoría</h1>
  <p class="cat-tagline" id="cat-tagline"></p>
  <p class="cat-desc" id="cat-desc"></p>
</header>

<!-- ═══ ARTÍCULOS ═══ -->
<section class="articles">
  <div class="section-label">Notas publicadas</div>
  <div class="article-grid" id="article-grid"></div>
</section>

<!-- ═══ FOOTER ═══ -->
<footer>
  <div class="footer-bottom">
    <span>© 2026 Andes Magazine</span>
    <div class="legal">
      <a href="index.html">Inicio</a>
      <a href="index.html#nosotros">Nosotros</a>
      <a href="#">Ética editorial</a>
    </div>
    <span>Santiago de Chile</span>
  </div>
</footer>

<script src="data.js"></script>
<script>
(function () {
  // 1. Leer parámetro ?cat=
  const params = new URLSearchParams(window.location.search);
  const catSlug = (params.get('cat') || 'prensa').toLowerCase();

  // 2. Buscar la categoría
  const cat = CATEGORIES[catSlug];

  if (!cat) {
    document.getElementById('cat-meta').textContent = '— Error';
    document.getElementById('cat-title').textContent = 'Categoría no encontrada';
    document.getElementById('cat-tagline').textContent = '';
    document.getElementById('cat-desc').innerHTML =
      'La categoría solicitada no existe. <a href="index.html" style="color:var(--accent)">Volver al inicio</a>.';
    return;
  }

  // 3. Título del documento + header
  document.title = `Andes Magazine — ${cat.title}`;
  document.getElementById('cat-meta').textContent = `${cat.num} — Eje editorial`;
  document.getElementById('cat-title').textContent = cat.title;
  document.getElementById('cat-tagline').textContent = cat.tagline;
  document.getElementById('cat-desc').textContent = cat.description;

  // 4. Marcar ítem activo en el nav
  const navLink = document.querySelector(`nav a[data-nav="${catSlug}"]`);
  if (navLink) navLink.classList.add('is-active');

  // 5. Listar artículos filtrados
  const grid = document.getElementById('article-grid');
  const list = ARTICLES.filter(a => a.category === catSlug);

  if (list.length === 0) {
    grid.innerHTML = '<div class="empty">Aún no hay notas publicadas en esta sección.</div>';
    return;
  }

  grid.innerHTML = list.map(a => `
    <a class="card" href="article.html?id=${encodeURIComponent(a.id)}">
      <div class="card-img">
        <img src="${a.image}" alt="${escapeAttr(a.title)}">
      </div>
      <div class="card-cat">${cat.title} · ${a.tag}</div>
      <h3>${escapeHtml(a.title)}</h3>
      <p class="card-excerpt">${escapeHtml(a.excerpt)}</p>
      <div class="card-byline">
        <span>${escapeHtml(a.author)}</span>
        <span>${escapeHtml(a.readingTime)} de lectura</span>
      </div>
    </a>
  `).join('');

  // Helpers
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    })[c]);
  }
  function escapeAttr(s) { return escapeHtml(s); }
})();
</script>
</body>
</html>
